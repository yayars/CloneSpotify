<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone Spotify</title>
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- Navbar -->
    <header>
        <div class="flex fixed bg-black w-full px-3 md:px-20 py-4">
            <div class="container flex items-center mx-auto">
                <a href="#">
                    <img src="img/spotify-logo.png" alt="Spotify" class="w-20 md:w-125px" />
                </a>
            </div>

            <div class="flex justify-end flex-1 md:hidden text-white text-3xl">
                <i class="fas fa-bars"></i>
            </div>

            <div class="items-end flex-1 text-white font-bold hidden md:flex">
                <nav class="flex-1">
                    <ul class="flex justify-end flex-1">
                        <li class="px-4"><a href="#" class="hover:text-hoverspt text-sm">Premium</a></li>
                        <li class="px-4"><a href="#" class="hover:text-hoverspt text-sm">Ajuda</a></li>
                        <li class="px-4"><a href="#" class="hover:text-hoverspt text-sm">Baixar</a></li>
                        <li class="px-4"><span class="border-r border-white"></span></li>
                        <li class="px-4"><a href="#" class="hover:text-hoverspt text-sm">Registrar</a></li>
                        <li class="px-4"><a href="#" class="hover:text-hoverspt text-sm">Entrar</a></li> 
                    </ul>
                </nav>
            </div>

        </div>
    </header>

    <!-- Conteudo-->
     <main>
        <div class="flex flex-col justify-center text-center bg-spotify-theme-mobile md:bg-spotify-theme md:bg-position-banner bg-size-195 md:bg-size-175 bg-purple-main text-green-main py-40 px-4">
            <h1 class="text-5xl md:text-9xl mb-10 font-bold max-w-3xl mx-auto leading-none "> Escutar muda tudo </h1>
        <p>Miilhões de músicas e podcasts para explorar. E nem precisa de cartão de crétido.</p>
        <a href="#"> 
            Obtenha o Spotify Freee
        </a>
        </div>
     </main>

</body>
</html>
